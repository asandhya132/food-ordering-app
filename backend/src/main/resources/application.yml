server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/food_app
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

app:
  cors:
    allowed-origins: "http://localhost:4200"

