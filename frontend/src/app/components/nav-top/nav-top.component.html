<div class="topbar">
  <div class="container inner">
    <!-- LEFT: App name / logo -->
    <a
      class="brand"
      routerLink="/"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span>SNVR Foods</span>
    </a>

    <!-- RIGHT: Navigation with icons -->
    <nav class="nav-links">
      <!-- Search icon (placeholder for future search page) -->
      <button class="btn" type="button">
        <span class="material-icons">search</span>
      </button>

      <!-- Home -->
      <a
        class="btn"
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="material-icons">home</span>
        <span>Home</span>
      </a>

      <!-- Foods -->
      <a
        class="btn"
        routerLink="/foods"
        routerLinkActive="active-link"
      >
        <span class="material-icons">restaurant_menu</span>
        <span>Foods</span>
      </a>

      <!-- Cart with live item count -->
      <a
        class="btn primary"
        routerLink="/cart"
        routerLinkActive="active-link"
      >
        <span class="material-icons">shopping_cart</span>
        <span>Cart</span>
        <span class="badge">{{ cart.totalItems$ | async }}</span>
      </a>

      <!-- Login/Profile (placeholder) -->
      <a
        class="btn"
        routerLink="/login"
        routerLinkActive="active-link"
      >
        <span class="material-icons">account_circle</span>
        <span>Login</span>
      </a>
    </nav>
  </div>
</div>
