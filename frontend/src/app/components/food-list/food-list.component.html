<!-- food-list.component.html -->
<div class="row" style="margin: 12px 0 16px">
  <div>
    <h2 style="margin: 0">Foods</h2>
    <div class="muted">Browse items and add them to your cart.</div>
  </div>
  <a class="btn primary" routerLink="/cart">Go to Cart</a>
</div>

<div *ngIf="loading" class="panel">Loading foods...</div>
<div *ngIf="!loading && error" class="panel" style="border-color: rgba(255,92,124,0.35)">
  {{ error }}
</div>

<div class="grid" *ngIf="!loading && !error">
  <div class="card" *ngFor="let food of foods">
    <div
      class="img"
      [style.backgroundImage]="
        'url(' + (food.imageUrl || 'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=800&q=60') + ')'
      "
      (click)="onDetails(food)"
      style="cursor: pointer"
    ></div>
    <div class="content">
      <div class="row">
        <div style="font-weight: 700">{{ food.name }}</div>
        <div class="price">₹{{ food.price }}</div>
      </div>
      <div class="muted" style="margin-top: 4px">{{ food.category }}</div>

      <div class="row" style="margin-top: 12px; align-items: center">
        <button class="btn" (click)="onDetails(food)">Details</button>

        <!-- Show Add to Cart if not in cart or quantity is 0 -->
        <ng-container *ngIf="getQuantity(food) === 0; else qtyControls">
          <button
            class="btn primary"
            (click)="onAdd(food)"
            [disabled]="food.availableQuantity === 0"
          >
            Add to Cart
          </button>
        </ng-container>

        <!-- Quantity controls when item is already in cart -->
        <ng-template #qtyControls>
          <div class="row" style="gap: 8px; align-items: center">
            <button class="btn" (click)="decrement(food)">-</button>
            <input
              class="qty"
              [value]="getQuantity(food)"
              readonly
              aria-label="Quantity"
            />
            <button
              class="btn"
              (click)="increment(food)"
              [disabled]="getQuantity(food) >= food.availableQuantity"
            >
              +
            </button>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>
