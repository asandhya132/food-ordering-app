<div class="row" style="margin: 12px 0 16px">
  <div>
    <h2 style="margin: 0">Cart</h2>
    <div class="muted">Update quantities, remove items, and place your order.</div>
  </div>
  <a class="btn" routerLink="/">Continue Shopping</a>
</div>

<div *ngIf="error" class="panel" style="border-color: rgba(255,92,124,0.35); margin-bottom: 12px">
  {{ error }}
</div>

<div class="panel" *ngIf="(cart.items$ | async) as items">
  <div *ngIf="items.length === 0" class="muted">Your cart is empty.</div>

  <table class="table" *ngIf="items.length > 0">
    <thead>
      <tr>
        <th>Food</th>
        <th>Price</th>
        <th style="width: 120px">Qty</th>
        <th>Line Total</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items; trackBy: trackByFoodId">
        <td>
          <div style="font-weight: 700">{{ item.food.name }}</div>
          <div class="muted">{{ item.food.category }}</div>
        </td>
        <td>₹{{ item.food.price }}</td>
        <td>
          <input
            class="qty"
            type="number"
            min="0"
            [value]="item.quantity"
            (input)="updateQty(item.food.id, $any($event.target).value)"
          />
        </td>
        <td>₹{{ item.quantity * item.food.price }}</td>
        <td style="text-align: right">
          <button class="btn danger" (click)="remove(item.food.id)">Remove</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="row" style="margin-top: 14px" *ngIf="items.length > 0">
    <div class="muted">Total</div>
    <div class="price" style="font-size: 18px">₹{{ cart.totalPrice$ | async }}</div>
  </div>

  <div class="row" style="margin-top: 14px" *ngIf="items.length > 0">
    <button class="btn" (click)="cart.clear()">Clear Cart</button>
    <button class="btn primary" (click)="placeOrder()" [disabled]="placingOrder">
      {{ placingOrder ? 'Placing Order...' : 'Place Order' }}
    </button>
  </div>
</div>
