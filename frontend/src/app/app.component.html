<div class="topbar">
  <div class="container inner">
    <a class="brand" routerLink="/">
      <span>Food Ordering App</span>
      <span class="badge">Beginner-friendly</span>
    </a>

    <div class="row">
      <button class="btn" type="button" (click)="toggleSidebar()" id="sidebar-toggle">
        Categories
      </button>
      <a class="btn" routerLink="/">Foods</a>
      <a class="btn primary" routerLink="/cart">
        Cart
        <span class="badge">{{ cart.totalItems$ | async }}</span>
      </a>
    </div>
  </div>
</div>

<div class="container layout">
  <div class="layout-body" [class.sidebar-collapsed]="!sidebarOpen">
    <div class="layout-sidebar">
      <app-sidebar></app-sidebar>
    </div>
    <div class="layout-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
